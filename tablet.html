    body { background: var(--bg-dark); color: #fff; display: flex; flex-direction: column; }
    .header { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    .shop-btn { flex-shrink: 0; background: #1e5799; border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 10px; padding: 12px 20px; font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }

    .tray { background: #0a1624; border-top: 1px solid rgba(255,255,255,0.1); padding: 16px 28px; flex-shrink: 0; }

    .tray-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .tray-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; }
    .tray-name { font-size: 1rem; font-weight: 600; }

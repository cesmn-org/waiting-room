    body { background: var(--bg-dark); color: #fff; }
    .header { padding: 20px 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    .header-title { font-size: 2.4rem; }
    .header-datetime { display: flex; align-items: center; gap: 16px; }
    .header-date { font-size: 2.2rem; font-weight: 600; color: rgba(255,255,255,0.6); }
    .datetime-sep { width: 1px; height: 2.4rem; background: rgba(255,255,255,0.2); }
    .clock { font-size: 2.2rem; font-weight: 600; letter-spacing: 0.04em; color: rgba(255,255,255,0.9); }
    .closed-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .closed-message { font-size: 3.5rem; font-weight: 700; color: rgba(255,255,255,0.75); text-align: center; padding: 0 60px; line-height: 1.3; }
    .name-row { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px 22px; border: 1px solid rgba(255,255,255,0.07); }
    .name-text { font-size: 2.4rem; font-weight: 600; letter-spacing: 0.01em; line-height: 1.2; }

  <div id="root"></div>

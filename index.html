    body {
      background: var(--bg-dark);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .launchpad {
      display: grid;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }
    .launch-btn {
      padding: 30px;
      font-size: 1.2rem;
      text-align: center;
      background: var(--primary);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      color: #fff !important;
      font-weight: 700;
      text-decoration: none;
    }
    .launch-btn:visited {
      color: #fff !important;
    }
    .launch-btn:hover {
      background: var(--primary-light);
      color: #fff !important;
    }
    .launchpad h1 { text-align: center; margin-bottom: 10px; font-size: 1.5rem; }
    .launchpad p { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 20px; font-size: 0.9rem; }

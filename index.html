<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CES Waiting Room</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTQiIGZpbGw9IiMxYTMyNTIiIHN0cm9rZT0iI2ZmZmZmZiIgc3Ryb2tlLXdpZHRoPSIyIi8+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMiIgZmlsbD0iI2ZmZmZmZiIvPjxsaW5lIHgxPSIxNiIgeTE9IjE2IiB4Mj0iMTYiIHkyPSI3IiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMi41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz48bGluZSB4MT0iMTYiIHkxPSIxNiIgeDI9IjIzIiB5Mj0iMTYiIHN0cm9rZT0iI2ZmZmZmZiIgc3Ryb2tlLXdpZHRoPSIyLjUiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPjwvc3ZnPg==" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #eef1f5;
      color: #222;
      min-height: 100vh;
    }

    /* ---- Disconnect Banner ---- */
    .banner {
      background: #b71c1c;
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ---- Header ---- */
    .header {
      background: #1a3252;
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-title { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.01em; }
    .header-right  { display: flex; align-items: center; gap: 14px; }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      padding: 5px 13px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      font-weight: 500;
    }
    .conn-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .conn-dot.live { background: #69f0ae; box-shadow: 0 0 7px #69f0ae; }
    .conn-dot.dead { background: #ef9a9a; box-shadow: 0 0 7px #ef9a9a; }

    .header-email {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
    }

    /* ---- Layout ---- */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }

    /* ---- Toolbar ---- */
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 16px; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover  { filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }
    .btn-primary   { background: #1a3252; color: #fff; }
    .btn-danger    { background: #d32f2f; color: #fff; }
    .btn-secondary { background: #e0e4ea; color: #333; }
    .btn-ghost     { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
    .btn-ghost:hover { background: rgba(255,255,255,0.22); filter: none; }
    .btn-sm { padding: 5px 11px; font-size: 0.8rem; }

    /* ---- Card ---- */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.09);
      overflow: hidden;
    }

    /* ---- Add Form ---- */
    .add-form { margin-bottom: 18px; padding: 20px 22px; }
    .form-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-field input,
    .form-field select {
      border: 1px solid #d0d5dd;
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 0.88rem;
      min-width: 130px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-field input:focus,
    .form-field select:focus {
      outline: none;
      border-color: #1a3252;
      box-shadow: 0 0 0 3px rgba(26,50,82,0.1);
    }

    /* ---- Table ---- */
    .table { width: 100%; border-collapse: collapse; }
    .table thead { background: #f7f8fb; }
    .table th {
      text-align: left;
      padding: 11px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      border-bottom: 1px solid #ececec;
    }
    .table td {
      padding: 9px 14px;
      border-bottom: 1px solid #f3f3f3;
      vertical-align: middle;
    }
    .table tbody tr:last-child td { border-bottom: none; }
    .table tbody tr { transition: background 0.1s; }
    .table tbody tr:hover { background: #fafbfc; }

    /* ---- Drag states ---- */
    .row-dragging { opacity: 0.3; }
    .row-drag-over td { background: #e8f4ff !important; }
    .row-drag-over td:first-child { border-left: 3px solid #1a3252; }

    .drag-handle {
      display: inline-block;
      cursor: grab;
      color: #ccc;
      font-size: 1.15rem;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 4px;
      user-select: none;
      transition: color 0.15s, background 0.15s;
    }
    .drag-handle:hover  { color: #555; background: #f0f0f0; }
    .drag-handle:active { cursor: grabbing; }

    /* ---- Cell selects ---- */
    .cell-select {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 0.84rem;
      background: #fff;
      cursor: pointer;
      min-width: 115px;
      transition: border-color 0.15s;
    }
    .cell-select:hover { border-color: #aaa; }
    .cell-select:focus { outline: none; border-color: #1a3252; }

    /* Status color coding */
    .status-checked-in { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
    .status-shopping   { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 60px 24px;
      font-size: 0.95rem;
    }

    /* ---- Row actions ---- */
    .row-actions { display: flex; gap: 6px; }

    /* ---- Modals ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 30px 32px;
      min-width: 360px;
      max-width: 90vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.2rem; margin-bottom: 22px; color: #1a1a1a; }
    .modal .form-field { margin-bottom: 14px; }
    .modal .form-field input { width: 100%; }
    .modal-body { color: #555; line-height: 1.6; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ---- Login page ---- */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef1f5;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 48px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3252;
      margin-bottom: 6px;
    }
    .login-card .login-sub {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 32px;
    }
    .login-card .form-field { margin-bottom: 16px; }
    .login-card .form-field input { width: 100%; }
    .login-error {
      background: #fdecea;
      color: #c62828;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      font-size: 0.95rem;
      justify-content: center;
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ---- Auth loading ---- */
    .auth-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.95rem;
    }

    .muted { color: #ccc; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { createClient } = supabase;
const { useState, useEffect, useCallback } = React;

const db = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);

// Appointment time options: Walk-in, then 1:00PM–5:45PM in 15-min increments
const TIME_OPTIONS = ['', 'Walk-in'];
for (let h = 1; h <= 5; h++) {
  for (let m = 0; m < 60; m += 15) {
    TIME_OPTIONS.push(`${h}:${String(m).padStart(2, '0')}PM`);
  }
}

const STATUS_OPTIONS = ['', 'Checked-in', 'Shopping'];

const EMPTY_NEW = { name_first: '', name_last: '', appt_time: '', status: '' };

function statusClass(s) {
  if (!s) return '';
  return 'status-' + s.toLowerCase().replace(/[^a-z]/g, '-');
}

// ============================================================
// Login Form
// ============================================================
function LoginForm() {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) setError(error.message);
    setLoading(false);
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <h1>CES Waiting Room</h1>
        <p className="login-sub">Sign in to manage the waiting room</p>

        {error && <div className="login-error">{error}</div>}

        <form onSubmit={handleSubmit}>
          <div className="form-field">
            <label>Email</label>
            <input
              type="email"
              autoFocus
              autoComplete="email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              required
            />
          </div>
          <div className="form-field">
            <label>Password</label>
            <input
              type="password"
              autoComplete="current-password"
              value={password}
              onChange={e => setPassword(e.target.value)}
              required
            />
          </div>
          <button className="btn btn-primary login-btn" type="submit" disabled={loading}>
            {loading ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ============================================================
// Waiting Room (main app — only rendered when authenticated)
// ============================================================
function WaitingRoom({ userEmail }) {
  const [clients,     setClients]     = useState([]);
  const [connected,   setConnected]   = useState(false);
  const [showAdd,     setShowAdd]     = useState(false);
  const [newClient,   setNewClient]   = useState(EMPTY_NEW);
  const [editRow,     setEditRow]     = useState(null);
  const [deleteRow,   setDeleteRow]   = useState(null);
  const [showClear,    setShowClear]    = useState(false);
  const [settings,     setSettings]     = useState({ closed: false, closed_message: "We'll be right back!" });
  const [showClose,    setShowClose]    = useState(false);
  const [closeMsg,     setCloseMsg]     = useState('');
  const [draggingIdx,  setDraggingIdx]  = useState(null);
  const [dragOverIdx,  setDragOverIdx]  = useState(null);

  // Sorted view used for rendering and drag-drop index math
  const rows = [...clients].sort((a, b) => a.seq - b.seq);

  // ---------- Data ----------
  const fetchAll = useCallback(async () => {
    const { data } = await db.from('clients').select('*').order('seq', { ascending: true });
    if (data) setClients(data);
  }, []);

  // ---------- Realtime ----------
  useEffect(() => {
    fetchAll();
    db.from('settings').select('*').eq('id', 1).single()
      .then(({ data }) => { if (data) setSettings(data); });

    const channel = db.channel('clients-rt')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'clients' },
        ({ new: r }) => setClients(p => [...p, r].sort((a, b) => a.seq - b.seq))
      )
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'clients' },
        ({ new: r }) => setClients(p => p.map(c => c.id === r.id ? r : c).sort((a, b) => a.seq - b.seq))
      )
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'clients' },
        ({ old: r }) => setClients(p => p.filter(c => c.id !== r.id))
      )
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'settings' },
        ({ new: r }) => setSettings(r)
      )
      .subscribe(status => setConnected(status === 'SUBSCRIBED'));

    return () => db.removeChannel(channel);
  }, [fetchAll]);

  // ---------- CRUD ----------
  const handleAdd = async () => {
    if (!newClient.name_first.trim() && !newClient.name_last.trim()) return;
    const maxSeq = rows.length > 0 ? Math.max(...rows.map(c => c.seq)) : 0;
    await db.from('clients').insert({
      name_first: newClient.name_first.trim() || null,
      name_last:  newClient.name_last.trim()  || null,
      appt_time:  newClient.appt_time  || null,
      status:     newClient.status     || null,
      seq:        maxSeq + 1,
    });
    setNewClient(EMPTY_NEW);
    setShowAdd(false);
  };

  const handleDelete = async () => {
    await db.from('clients').delete().eq('id', deleteRow.id);
    setDeleteRow(null);
  };

  const handleClearAll = async () => {
    await db.from('clients').delete().neq('id', 0);
    setShowClear(false);
  };

  const handleCloseDisplay = async () => {
    const msg = closeMsg.trim() || "We'll be right back!";
    setSettings(s => ({ ...s, closed: true, closed_message: msg }));
    setShowClose(false);
    await db.from('settings').update({ closed: true, closed_message: msg }).eq('id', 1);
  };

  const handleOpenDisplay = async () => {
    setSettings(s => ({ ...s, closed: false }));
    await db.from('settings').update({ closed: false }).eq('id', 1);
  };

  const handleEditSave = async () => {
    await db.from('clients').update({
      name_first: editRow.name_first?.trim() || null,
      name_last:  editRow.name_last?.trim()  || null,
    }).eq('id', editRow.id);
    setEditRow(null);
  };

  const handleStatus = async (id, status) => {
    setClients(p => p.map(c => c.id === id ? { ...c, status: status || null } : c));
    await db.from('clients').update({ status: status || null }).eq('id', id);
  };
  const handleAppt = async (id, appt_time) => {
    setClients(p => p.map(c => c.id === id ? { ...c, appt_time: appt_time || null } : c));
    await db.from('clients').update({ appt_time: appt_time || null }).eq('id', id);
  };

  // ---------- Drag & Drop ----------
  const onDragStart = (e, idx) => {
    if (['BUTTON', 'SELECT', 'INPUT'].includes(e.target.tagName)) {
      e.preventDefault();
      return;
    }
    setDraggingIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
  };

  const onDragOver = (e, idx) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (dragOverIdx !== idx) setDragOverIdx(idx);
  };

  const onDragEnd = () => { setDraggingIdx(null); setDragOverIdx(null); };

  const onDrop = async (e, dropIdx) => {
    e.preventDefault();
    const fromIdx = draggingIdx;
    setDraggingIdx(null);
    setDragOverIdx(null);
    if (fromIdx === null || fromIdx === dropIdx) return;

    const next = [...rows];
    const [moved] = next.splice(fromIdx, 1);
    next.splice(dropIdx, 0, moved);

    const updated = next.map((c, i) => ({ ...c, seq: i + 1 }));
    setClients(updated);

    await db.rpc('reorder_clients', {
      reorder_data: updated.map(c => ({ id: c.id, seq: c.seq }))
    });
  };

  // ---------- Render ----------
  return (
    <div>
      {!connected && (
        <div className="banner">
          ⚠ Disconnected from Supabase — real-time updates are paused
        </div>
      )}

      <header className="header">
        <span className="header-title">CES Waiting Room</span>
        <div className="header-right">
          <div className="conn-badge">
            <span className={`conn-dot ${connected ? 'live' : 'dead'}`} />
            {connected ? 'Live' : 'Disconnected'}
          </div>
          <span className="header-email">{userEmail}</span>
          {settings.closed
            ? <button className="btn btn-ghost btn-sm" style={{ color: '#69f0ae', borderColor: '#69f0ae' }} onClick={handleOpenDisplay}>Open Display</button>
            : <button className="btn btn-ghost btn-sm" onClick={() => { setCloseMsg(settings.closed_message); setShowClose(true); }}>Close Display</button>
          }
          <button className="btn btn-ghost btn-sm" onClick={() => db.auth.signOut()}>
            Sign out
          </button>
        </div>
      </header>

      <div className="container">

        <div className="toolbar">
          <button className="btn btn-danger btn-sm" onClick={() => setShowClear(true)}
            style={{ marginRight: 'auto' }} disabled={rows.length === 0}>
            Clear All
          </button>
          <button className="btn btn-primary" onClick={() => setShowAdd(v => !v)}>
            {showAdd ? '✕ Cancel' : '+ Add Neighbor'}
          </button>
        </div>

        {showAdd && (
          <div className="card add-form">
            <div className="form-row">
              <div className="form-field">
                <label>First Name</label>
                <input
                  autoFocus
                  placeholder="First name"
                  value={newClient.name_first}
                  onChange={e => setNewClient(p => ({ ...p, name_first: e.target.value }))}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                />
              </div>
              <div className="form-field">
                <label>Last Name</label>
                <input
                  placeholder="Last name"
                  value={newClient.name_last}
                  onChange={e => setNewClient(p => ({ ...p, name_last: e.target.value }))}
                  onKeyDown={e => e.key === 'Enter' && handleAdd()}
                />
              </div>
              <div className="form-field">
                <label>Appt Time</label>
                <select value={newClient.appt_time} onChange={e => setNewClient(p => ({ ...p, appt_time: e.target.value }))}>
                  {TIME_OPTIONS.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-field">
                <label>Status</label>
                <select value={newClient.status} onChange={e => setNewClient(p => ({ ...p, status: e.target.value }))}>
                  {STATUS_OPTIONS.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <button className="btn btn-primary" style={{ alignSelf: 'flex-end' }} onClick={handleAdd}>
                Add
              </button>
            </div>
          </div>
        )}

        <div className="card">
          <table className="table">
            <thead>
              <tr>
                <th style={{ width: 44 }}></th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Appt Time</th>
                <th>Status</th>
                <th style={{ width: 140 }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr>
                  <td colSpan={6} className="empty-state">No neighbors in the waiting room</td>
                </tr>
              ) : rows.map((c, idx) => (
                <tr
                  key={c.id}
                  draggable
                  onDragStart={e => onDragStart(e, idx)}
                  onDragOver={e => onDragOver(e, idx)}
                  onDrop={e => onDrop(e, idx)}
                  onDragEnd={onDragEnd}
                  className={[
                    draggingIdx === idx ? 'row-dragging' : '',
                    dragOverIdx === idx ? 'row-drag-over' : '',
                  ].filter(Boolean).join(' ')}
                >
                  <td>
                    <span className="drag-handle" title="Drag to reorder">⠿</span>
                  </td>
                  <td>{c.name_first || <span className="muted">—</span>}</td>
                  <td>{c.name_last  || <span className="muted">—</span>}</td>
                  <td>
                    <select
                      className="cell-select"
                      value={c.appt_time ?? ''}
                      onChange={e => handleAppt(c.id, e.target.value)}
                    >
                      {TIME_OPTIONS.map(t => <option key={t}>{t}</option>)}
                    </select>
                  </td>
                  <td>
                    <select
                      className={`cell-select ${statusClass(c.status)}`}
                      value={c.status ?? ''}
                      onChange={e => handleStatus(c.id, e.target.value)}
                    >
                      {STATUS_OPTIONS.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </td>
                  <td>
                    <div className="row-actions">
                      <button className="btn btn-sm btn-secondary" onClick={() => setEditRow({ ...c })}>Edit</button>
                      <button className="btn btn-sm btn-danger"    onClick={() => setDeleteRow(c)}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Edit Modal */}
      {editRow && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setEditRow(null)}>
          <div className="modal">
            <h2>Edit Neighbor</h2>
            <div className="form-field">
              <label>First Name</label>
              <input
                autoFocus
                value={editRow.name_first || ''}
                onChange={e => setEditRow(p => ({ ...p, name_first: e.target.value }))}
                onKeyDown={e => e.key === 'Enter' && handleEditSave()}
              />
            </div>
            <div className="form-field">
              <label>Last Name</label>
              <input
                value={editRow.name_last || ''}
                onChange={e => setEditRow(p => ({ ...p, name_last: e.target.value }))}
                onKeyDown={e => e.key === 'Enter' && handleEditSave()}
              />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setEditRow(null)}>Cancel</button>
              <button className="btn btn-primary"   onClick={handleEditSave}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* Close Display Modal */}
      {showClose && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowClose(false)}>
          <div className="modal">
            <h2>Close Display</h2>
            <div className="form-field">
              <label>Message shown on display</label>
              <input
                autoFocus
                value={closeMsg}
                onChange={e => setCloseMsg(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleCloseDisplay()}
                placeholder="We'll be right back!"
              />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowClose(false)}>Cancel</button>
              <button className="btn btn-danger" onClick={handleCloseDisplay}>Close Display</button>
            </div>
          </div>
        </div>
      )}

      {/* Clear All Confirmation Modal */}
      {showClear && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowClear(false)}>
          <div className="modal">
            <h2>Clear Waiting Room?</h2>
            <p className="modal-body">
              This will remove all {rows.length} neighbor{rows.length !== 1 ? 's' : ''} from the waiting room. This cannot be undone.
            </p>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setShowClear(false)}>Cancel</button>
              <button className="btn btn-danger"    onClick={handleClearAll}>Clear All</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Confirmation Modal */}
      {deleteRow && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setDeleteRow(null)}>
          <div className="modal">
            <h2>Remove Neighbor?</h2>
            <p className="modal-body">
              Remove <strong>
                {[deleteRow.name_first, deleteRow.name_last].filter(Boolean).join(' ') || 'this neighbor'}
              </strong> from the waiting room?
            </p>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setDeleteRow(null)}>Cancel</button>
              <button className="btn btn-danger"    onClick={handleDelete}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// App — auth shell
// ============================================================
function App() {
  const [session,     setSession]     = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });

    const { data: { subscription } } = db.auth.onAuthStateChange((_, session) => {
      setSession(session);
    });

    return () => subscription.unsubscribe();
  }, []);

  if (authLoading) return <div className="auth-loading">Loading…</div>;
  if (!session)    return <LoginForm />;

  return <WaitingRoom userEmail={session.user.email} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
